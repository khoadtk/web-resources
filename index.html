  .chip { font: inherit; font-size: .82rem; padding: .3rem .75rem; border-radius: 999px;
          border: 1px solid var(--border); background: var(--bg); color: var(--fg);

  .chip.on { background: var(--accent); border-color: var(--accent); color: #fff; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: .6rem; }
  .card { display: block; text-decoration: none; color: inherit; background: var(--card);
          border: 1px solid var(--border); border-radius: 10px; padding: .7rem .9rem;
          transition: border-color .12s; }
  .card:hover { border-color: var(--accent); }
  .card .t { font-weight: 600; color: var(--accent); font-size: .95rem; }
  .card .d { color: var(--muted); font-size: .82rem; margin-top: .2rem; line-height: 1.45; }
  .badge { display: inline-block; font-size: .68rem; font-weight: 600; padding: .05rem .45rem;
           border-radius: 999px; background: color-mix(in srgb, var(--accent) 15%, var(--bg));
           color: var(--accent); border: 1px solid var(--accent); margin-left: .35rem;
           vertical-align: 1px; }
  .empty { color: var(--muted); text-align: center; padding: 3rem 0; }
  kbd { font-family: ui-monospace, Menlo, monospace; font-size: .8em; background: var(--card);
        border: 1px solid var(--border); border-radius: 4px; padding: .05em .4em; }
  #hint { display: none; font-size: .85rem; color: var(--muted); background: var(--card);
          border: 1px solid var(--border); border-radius: 8px; padding: .6rem .9rem; margin: 0 0 1rem; }
  /* ---- preview modal ---- */
  #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45);
             z-index: 50; align-items: center; justify-content: center; padding: 2rem 1rem; }
  #panel { background: var(--bg); border: 1px solid var(--border); border-radius: 12px;
           max-width: 820px; width: 100%; max-height: 88vh; display: flex; flex-direction: column; }
  #phead { display: flex; justify-content: space-between; align-items: center; gap: 1rem;
           padding: .7rem 1.1rem; border-bottom: 1px solid var(--border); }
  #phead a { color: var(--accent); font-size: .85rem; margin-right: .75rem; text-decoration: none; }
  #pclose { font: inherit; background: none; border: 1px solid var(--border); border-radius: 6px;
            color: var(--fg); cursor: pointer; padding: .15rem .55rem; }
  .md-body { overflow-y: auto; padding: .5rem 1.4rem 2rem; line-height: 1.6; font-size: .95rem; }
  .md-body h1 { font-size: 1.35rem; margin: .9rem 0 .5rem; }

  .md-body h3 { font-size: 1rem; margin: 1.1rem 0 .4rem; }
  .md-body pre { background: var(--card); border: 1px solid var(--border); border-radius: 8px;
                 padding: .8rem; overflow-x: auto; position: relative; }
  .md-body code { font-family: ui-monospace, Menlo, monospace; font-size: .85em;

  .md-body pre code { background: none; padding: 0; font-size: .8rem; display: block; }

  .md-body table { border-collapse: collapse; width: 100%; font-size: .85rem; }
  .md-body th, .md-body td { border: 1px solid var(--border); padding: .4rem .6rem; text-align: left; }
  .md-body th { background: var(--card); }
  .md-body a { color: var(--accent); }
  .md-body hr { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }
  .plang { position: absolute; top: .3rem; right: .55rem; font-size: .68rem; color: var(--muted);

const GROUPS = ["Assets", "Visualization", "UI", "Data & Backend", "Backend fundamentals", "Web fundamentals", "Nền tảng khác", "Tooling"];

const norm = s => s.normalize("NFD").replace(/[̀-ͯ]/g, "").replace(/đ/g, "d").replace(/Đ/g, "d").toLowerCase();
DATA.forEach(x => x._s = norm(`${x.t} ${x.d} ${x.k} ${x.f}`));

let query = "", activeGroup = null;
const q = document.getElementById("q"), list = document.getElementById("list"),
      count = document.getElementById("count"), chips = document.getElementById("chips");

function makeChip(label, group) {
  const b = document.createElement("button");
  b.className = "chip"; b.textContent = label;
  b.onclick = () => { activeGroup = group; render(); };
  return b;
}
function renderChips() {
  chips.innerHTML = "";
  const all = makeChip("Tất cả", null);
  if (activeGroup === null) all.classList.add("on");
  chips.appendChild(all);
  GROUPS.forEach(g => {
    const c = makeChip(g, g);
    if (activeGroup === g) c.classList.add("on");
    chips.appendChild(c);
  });
}
function render() {
  renderChips();
  const nq = norm(query.trim());
  const hits = DATA.filter(x =>
    (activeGroup === null || x.g === activeGroup) &&
    (nq === "" || nq.split(/\s+/).every(w => x._s.includes(w)))
  );
  count.textContent = `${hits.length}/${DATA.length} chủ đề`;
  list.innerHTML = "";
  if (!hits.length) {
    list.innerHTML = `<p class="empty">Không thấy gì cho “${query}” — thử từ khoá khác?</p>`;
    return;
  }
  GROUPS.forEach(g => {
    const items = hits.filter(x => x.g === g);
    if (!items.length) return;
    const sec = document.createElement("div");
    sec.className = "group";
    sec.innerHTML = `<h2>${g} (${items.length})</h2>`;
    const grid = document.createElement("div");
    grid.className = "grid";
    items.forEach(x => {
      const a = document.createElement("a");
      a.className = "card"; a.href = x.f;
      a.innerHTML = `<span class="t">${x.t}</span>${x.dd ? '<span class="badge">deep-dive</span>' : ""}<div class="d">${x.d}</div>`;
      a.onclick = e => {
        // Ctrl/⌘/Shift+click hoặc đang mở file:// (fetch bị chặn) → điều hướng như link thường
        if (e.metaKey || e.ctrlKey || e.shiftKey || location.protocol === "file:") return;
        e.preventDefault();
        openPreview(x.f, x.t);
      };
      grid.appendChild(a);
    });
    sec.appendChild(grid);
    list.appendChild(sec);
  });
}
q.addEventListener("input", () => { query = q.value; render(); });
document.addEventListener("keydown", e => {
  if (e.key === "/" && document.activeElement !== q) { e.preventDefault(); q.focus(); }
  if (e.key === "Escape") {
    if (overlay.style.display === "flex") { closePreview(); return; }
    q.value = ""; query = ""; render(); q.blur();
  }
});
render();

/* ---------- markdown preview ---------- */
const overlay = document.getElementById("overlay"),
      mdBody = document.getElementById("md-body"),
      mdTitle = document.getElementById("md-title"),
      mdOpen = document.getElementById("md-open");
let currentDir = "";

const esc2 = s => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

function inlineMd(s) {
  const codes = [];
  s = esc2(s).replace(/`([^`]+)`/g, (_, c) => { codes.push(c); return "\x00" + (codes.length - 1) + "\x00"; });
  s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/\*([^*\s][^*]*)\*/g, "<em>$1</em>");
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, t, h) =>
    /\.md$/i.test(h) ? `<a href="${h}" data-md="${h}">${t}</a>`
                     : `<a href="${h}" target="_blank" rel="noopener">${t}</a>`);
  return s.replace(/\x00(\d+)\x00/g, (_, i) => `<code>${codes[+i]}</code>`);
}

function mdToHtml(md) {
  const lines = md.split(/\r?\n/);
  let html = "", i = 0, para = [];
  const flush = () => { if (para.length) { html += `<p>${inlineMd(para.join(" "))}</p>`; para = []; } };
  while (i < lines.length) {
    const L = lines[i];
    if (/^```/.test(L)) {                                        // code fence
      flush();
      const lang = L.slice(3).trim();
      const code = [];
      i++;
      while (i < lines.length && !/^```/.test(lines[i])) code.push(lines[i++]);
      i++;
      html += `<pre>${lang ? `<span class="plang">${esc2(lang)}</span>` : ""}<code>${esc2(code.join("\n"))}</code></pre>`;
      continue;
    }
    const h = L.match(/^(#{1,4})\s+(.*)/);                       // heading
    if (h) { flush(); html += `<h${h[1].length}>${inlineMd(h[2])}</h${h[1].length}>`; i++; continue; }
    if (/^>\s?/.test(L)) {                                       // blockquote
      flush();
      const bq = [];
      while (i < lines.length && /^>\s?/.test(lines[i])) bq.push(lines[i++].replace(/^>\s?/, ""));
      html += `<blockquote>${mdToHtml(bq.join("\n"))}</blockquote>`;
      continue;
    }
    if (/^\|/.test(L) && i + 1 < lines.length                    // table
        && /^\|?[\s:|-]+\|?$/.test(lines[i + 1].trim()) && lines[i + 1].includes("-")) {
      flush();
      const cells = r => r.trim().replace(/^\||\|$/g, "").split("|").map(c => inlineMd(c.trim()));
      const head = cells(L); i += 2;
      let body = "";
      while (i < lines.length && /^\|/.test(lines[i])) body += `<tr>${cells(lines[i++]).map(c => `<td>${c}</td>`).join("")}</tr>`;
      html += `<div class="twrap"><table><tr>${head.map(c => `<th>${c}</th>`).join("")}</tr>${body}</table></div>`;
      continue;
    }
    if (/^\s*([-*]|\d+\.)\s+/.test(L)) {                         // list (checkbox → ☐/☑)
      flush();
      const ordered = /^\s*\d+\./.test(L);
      let items = "";
      while (i < lines.length && /^\s*([-*]|\d+\.)\s+/.test(lines[i])) {
        let item = lines[i++].replace(/^\s*([-*]|\d+\.)\s+/, "");
        while (i < lines.length && /^\s{2,}\S/.test(lines[i]) && !/^\s*([-*]|\d+\.)\s+/.test(lines[i]))
          item += " " + lines[i++].trim();
        item = item.replace(/^\[ \]\s*/, "☐ ").replace(/^\[x\]\s*/i, "☑ ");
        items += `<li>${inlineMd(item)}</li>`;
      }
      html += ordered ? `<ol>${items}</ol>` : `<ul>${items}</ul>`;
      continue;
    }
    if (/^---+\s*$/.test(L)) { flush(); html += "<hr>"; i++; continue; }
    if (L.trim() === "") { flush(); i++; continue; }
    para.push(L.trim()); i++;
  }
  flush();
  return html;
}

function resolvePath(href) {
  const stack = [];
  for (const p of (currentDir + href).split("/")) {
    if (p === "." || p === "") continue;
    if (p === ".." && stack.length && stack[stack.length - 1] !== "..") stack.pop();
    else stack.push(p);
  }
  return stack.join("/");
}

async function openPreview(f, title) {
  overlay.style.display = "flex";
  mdTitle.textContent = title || f.split("/").pop();
  mdOpen.href = f;
  mdBody.innerHTML = '<p style="color:var(--muted)">Đang tải…</p>';
  currentDir = f.slice(0, f.lastIndexOf("/") + 1);
  try {
    const res = await fetch(f);
    if (!res.ok) throw new Error("HTTP " + res.status);
    mdBody.innerHTML = mdToHtml(await res.text());
    mdBody.scrollTop = 0;
  } catch (err) {
    mdBody.innerHTML = `<p><strong>Không tải được file.</strong> (${esc2(String(err))})</p>
      <p>Vẫn xem được bản gốc qua nút "mở file gốc ↗" phía trên.</p>`;
  }
}
function closePreview() { overlay.style.display = "none"; }

document.getElementById("pclose").onclick = closePreview;
overlay.addEventListener("click", e => { if (e.target === overlay) closePreview(); });
mdBody.addEventListener("click", e => {
  const a = e.target.closest("a[data-md]");
  if (!a) return;
  e.preventDefault();
  const path = resolvePath(a.getAttribute("data-md"));
  const entry = DATA.find(x => x.f === path || x.f === "./" + path);
  openPreview(path, entry ? entry.t : path.split("/").pop());
});

if (location.protocol === "file:") {
  const hint = document.getElementById("hint");
  hint.style.display = "block";
  hint.innerHTML = '⚠️ Đang mở trực tiếp từ ổ đĩa nên preview bị trình duyệt chặn — card sẽ mở file gốc. ' +
    'Muốn preview trong trang: chạy <code>npx serve</code> trong thư mục này, hoặc VS Code → chuột phải ' +
    '<code>index.html</code> → <strong>Open with Live Server</strong>.';
}
</script>
</body>
